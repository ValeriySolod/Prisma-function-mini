name: Windows CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Test and package
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      PYTHONUTF8: "1"
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install pinned dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Run test suite
        run: python -m pytest -q

      - name: Compile Python sources
        run: python -m compileall -q app.py auction_csv.py browser.py monitoring.py processor.py runtime_logging.py scheduler.py storage.py tests

      - name: Validate PyInstaller package
        run: python -m PyInstaller --clean --noconfirm PrismaFunction.spec
